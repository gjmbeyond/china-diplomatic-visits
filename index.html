<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2025年4月以来各国高层访华可视化</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson@3"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a1628;
            --panel-bg: rgba(16, 30, 55, 0.95);
            --accent-gold: #c9a227;
            --accent-red: #c41e3a;
            --text-primary: #e8e8e8;
            --text-secondary: #9ca3af;
            --border-color: rgba(201, 162, 39, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 背景装饰 */
        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-decoration::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(196, 30, 58, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(201, 162, 39, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(16, 30, 55, 0.5) 0%, transparent 70%);
            animation: bgPulse 20s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.05) rotate(2deg); }
        }

        /* 头部 */
        header {
            position: relative;
            z-index: 10;
            padding: 2rem 3rem;
            background: linear-gradient(180deg, rgba(10, 22, 40, 0.95) 0%, transparent 100%);
        }

        .header-content {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-gold) 0%, #f4d03f 50%, var(--accent-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(201, 162, 39, 0.3);
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 0.3rem;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border: 1px solid var(--border-color);
            background: rgba(201, 162, 39, 0.1);
            color: var(--accent-gold);
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background: rgba(201, 162, 39, 0.2);
            border-color: var(--accent-gold);
            transform: translateY(-1px);
        }

        .btn-primary {
            background: var(--accent-red);
            border-color: var(--accent-red);
            color: white;
        }

        .btn-primary:hover {
            background: #d62839;
            border-color: #d62839;
        }

        /* 主容器 */
        .main-container {
            position: relative;
            z-index: 5;
            display: flex;
            height: calc(100vh - 120px);
            padding: 0 1rem 1rem;
            gap: 1rem;
        }

        /* 地图区域 */
        .map-container {
            flex: 1;
            background: var(--panel-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        /* 国家路径样式 */
        .country {
            stroke: rgba(201, 162, 39, 0.3);
            stroke-width: 0.5;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .country:hover {
            stroke: var(--accent-gold);
            stroke-width: 1.5;
            filter: brightness(1.1);
        }

        .country.no-data {
            fill: #1a2744;
        }

        /* 图例 */
        .legend {
            position: absolute;
            bottom: 2rem;
            left: 2rem;
            background: rgba(10, 22, 40, 0.9);
            padding: 1.2rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }

        .legend-title {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            color: var(--accent-gold);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .legend-color {
            width: 20px;
            height: 14px;
            border-radius: 2px;
            border: 1px solid rgba(201, 162, 39, 0.3);
        }

        /* 侧边栏 */
        .sidebar {
            width: 380px;
            background: var(--panel-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 1.2rem;
            border-bottom: 1px solid var(--border-color);
            background: rgba(201, 162, 39, 0.05);
        }

        .sidebar-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent-gold);
        }

        .sidebar-stats {
            display: flex;
            gap: 1.5rem;
            margin-top: 0.8rem;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-gold);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.2rem;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        /* 访问列表 */
        .visit-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .visit-item {
            background: rgba(26, 39, 68, 0.6);
            border: 1px solid rgba(201, 162, 39, 0.15);
            border-radius: 8px;
            padding: 1rem;
            transition: all 0.3s ease;
        }

        .visit-item:hover {
            border-color: var(--border-color);
            background: rgba(26, 39, 68, 0.8);
        }

        .visit-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.5rem;
        }

        .visit-country {
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-primary);
        }

        .visit-count {
            background: var(--accent-red);
            color: white;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
        }

        .visit-leaders {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .visit-leader {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.4rem;
            padding: 0.4rem;
            background: rgba(201, 162, 39, 0.05);
            border-radius: 4px;
        }

        .leader-name {
            font-weight: 500;
            color: var(--accent-gold);
        }

        .leader-title {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .leader-date {
            margin-left: auto;
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-family: monospace;
        }

        /* 提示框 */
        .tooltip {
            position: absolute;
            background: rgba(10, 22, 40, 0.98);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 1000;
            max-width: 320px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        .tooltip.visible {
            opacity: 1;
        }

        .tooltip-country {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent-gold);
            margin-bottom: 0.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .tooltip-visits {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.8rem;
        }

        .tooltip-leaders {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .tooltip-leader {
            background: rgba(201, 162, 39, 0.08);
            padding: 0.6rem;
            border-radius: 4px;
            border-left: 2px solid var(--accent-gold);
        }

        .tooltip-leader-name {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .tooltip-leader-title {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.2rem;
        }

        .tooltip-leader-date {
            font-size: 0.75rem;
            color: var(--accent-gold);
            margin-top: 0.3rem;
            font-family: monospace;
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow: hidden;
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal-header {
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(201, 162, 39, 0.05);
        }

        .modal-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.2rem;
            color: var(--accent-gold);
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .modal-close:hover {
            color: var(--accent-gold);
        }

        .modal-body {
            padding: 1.5rem;
            overflow-y: auto;
            max-height: calc(90vh - 140px);
        }

        /* 数据编辑器 */
        .editor-section {
            margin-bottom: 1.5rem;
        }

        .editor-section-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--accent-gold);
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .form-input, .form-select {
            padding: 0.6rem 0.8rem;
            background: rgba(26, 39, 68, 0.6);
            border: 1px solid rgba(201, 162, 39, 0.2);
            border-radius: 4px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: var(--accent-gold);
            background: rgba(26, 39, 68, 0.8);
        }

        .leaders-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .leader-entry {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 0.6rem;
            align-items: center;
            padding: 0.8rem;
            background: rgba(26, 39, 68, 0.4);
            border-radius: 6px;
            border: 1px solid rgba(201, 162, 39, 0.1);
        }

        .btn-small {
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
        }

        .btn-danger {
            background: rgba(196, 30, 58, 0.2);
            border-color: var(--accent-red);
            color: var(--accent-red);
        }

        .btn-danger:hover {
            background: rgba(196, 30, 58, 0.3);
        }

        .btn-success {
            background: rgba(39, 174, 96, 0.2);
            border-color: #27ae60;
            color: #27ae60;
        }

        .btn-success:hover {
            background: rgba(39, 174, 96, 0.3);
        }

        .modal-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }

        /* JSON编辑器 */
        .json-editor {
            width: 100%;
            min-height: 300px;
            padding: 1rem;
            background: rgba(10, 15, 25, 0.9);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: #a8d5ba;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            resize: vertical;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(26, 39, 68, 0.3);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-gold);
        }

        /* 响应式 */
        @media (max-width: 1200px) {
            .main-container {
                flex-direction: column;
                height: auto;
            }

            .sidebar {
                width: 100%;
                height: 500px;
            }

            .map-container {
                height: 600px;
            }
        }

        @media (max-width: 768px) {
            header {
                padding: 1rem;
            }

            h1 {
                font-size: 1.3rem;
            }

            .header-actions {
                width: 100%;
                justify-content: flex-start;
            }

            .legend {
                bottom: 1rem;
                left: 1rem;
                padding: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-decoration"></div>

    <header>
        <div class="header-content">
            <div>
                <h1>🌏 各国高层访华可视化地图</h1>
                <div class="subtitle">自2025年4月美国"关税解放日"以来的外交访问记录</div>
            </div>
            <div class="header-actions">
                <button class="btn" onclick="openDataEditor()">
                    <span>✏️</span> 编辑数据
                </button>
                <button class="btn" onclick="exportData()">
                    <span>💾</span> 导出JSON
                </button>
                <button class="btn btn-primary" onclick="openImportModal()">
                    <span>📁</span> 导入数据
                </button>
            </div>
        </div>
    </header>

    <div class="main-container">
        <div class="map-container">
            <div id="map"></div>
            <div class="legend">
                <div class="legend-title">访问次数图例</div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #7f1d1d;"></div>
                    <span>5次以上</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #b91c1c;"></div>
                    <span>3-4次</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #dc2626;"></div>
                    <span>2次</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #ef4444;"></div>
                    <span>1次</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #1a2744;"></div>
                    <span>无访问记录</span>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">📊 访问统计</div>
                <div class="sidebar-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="totalCountries">0</div>
                        <div class="stat-label">访问国家</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="totalVisits">0</div>
                        <div class="stat-label">总访问次数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="totalLeaders">0</div>
                        <div class="stat-label">访问领导人</div>
                    </div>
                </div>
            </div>
            <div class="sidebar-content">
                <div class="visit-list" id="visitList">
                    <!-- 动态生成 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 提示框 -->
    <div class="tooltip" id="tooltip">
        <div class="tooltip-country"></div>
        <div class="tooltip-visits"></div>
        <div class="tooltip-leaders"></div>
    </div>

    <!-- 数据编辑器模态框 -->
    <div class="modal-overlay" id="dataEditorModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">✏️ 编辑访问数据</div>
                <button class="modal-close" onclick="closeDataEditor()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="editor-section">
                    <div class="editor-section-title">选择国家</div>
                    <div class="form-row">
                        <div class="form-group full-width">
                            <label class="form-label">国家/地区</label>
                            <select class="form-select" id="editorCountrySelect" onchange="onCountrySelect()">
                                <option value="">-- 选择国家 --</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="editor-section" id="leaderEditorSection" style="display: none;">
                    <div class="editor-section-title">👤 访问领导人</div>
                    <div class="leaders-list" id="leadersList">
                        <!-- 动态生成 -->
                    </div>
                    <button class="btn btn-success btn-small" onclick="addLeaderEntry()" style="margin-top: 0.8rem;">
                        <span>+</span> 添加领导人
                    </button>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeDataEditor()">取消</button>
                <button class="btn btn-primary" onclick="saveDataChanges()">保存更改</button>
            </div>
        </div>
    </div>

    <!-- JSON导入模态框 -->
    <div class="modal-overlay" id="importModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">📁 导入/导出 JSON 数据</div>
                <button class="modal-close" onclick="closeImportModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="editor-section">
                    <div class="editor-section-title">数据格式说明</div>
                    <p style="font-size: 0.85rem; color: var(--text-secondary); line-height: 1.6; margin-bottom: 1rem;">
                        数据采用 ISO 3166-1 alpha-3 三位国家代码作为键。每个国家包含领导人访问列表，
                        每位领导人包含姓名、职位和访问日期。编辑完成后点击"保存到本地"即可更新地图。
                    </p>
                </div>
                <textarea class="json-editor" id="jsonEditor" placeholder="{
  \"CHN\": {
    \"name\": \"中国\",
    \"leaders\": [
      {\"name\": \"示例\", \"title\": \"国家主席\", \"date\": \"2025-04-15\"}
    ]
  }
}"></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeImportModal()">取消</button>
                <button class="btn" onclick="copyToClipboard()">📋 复制</button>
                <button class="btn btn-primary" onclick="saveJsonData()">💾 保存到本地</button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
